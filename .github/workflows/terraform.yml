name: Terraform Dev

on:
  push:
    branches:
      - main
    #paths:
    #  - "terraform/**"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::160885282586:role/GitHubActionsTerraformDeployRole
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run:  terraform init -backend-config="backend/dev.hcl"
      
      - name: Terraform Format
        run:   terraform fmt -recursive

      - name: Terraform Plan
        run:  terraform plan -var-file="envs/dev/dev.tfvars"

      - name: Terraform Apply
        run: terraform apply -var-file="envs/dev/dev.tfvars" --auto-approve
